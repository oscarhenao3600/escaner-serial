<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner de serial</title>
<style>
  :root{
    --bg:#F4F1EA;
    --panel:#FFFFFF;
    --ink:#2C2C2A;
    --muted:#5F5E5A;
    --accent:#0F6E56;
    --accent-dark:#085041;
    --border:#D3D1C7;
    --danger:#993C1D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }
  h1{
    font-size:18px;
    font-weight:600;
    margin:8px 0 2px;
    text-align:center;
  }
  p.sub{
    font-size:13px;
    color:var(--muted);
    margin:0 0 18px;
    text-align:center;
  }
  #video-wrap{
    width:100%;
    max-width:420px;
    aspect-ratio:4/3;
    background:#111;
    border-radius:14px;
    overflow:hidden;
    position:relative;
    border:1px solid var(--border);
  }
  video{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  #scan-line{
    position:absolute;
    left:8%;
    right:8%;
    top:50%;
    height:2px;
    background:#3BD68C;
    box-shadow:0 0 8px 1px #3BD68C;
    animation:scan 1.8s ease-in-out infinite;
  }
  @keyframes scan{
    0%{top:20%;}
    50%{top:80%;}
    100%{top:20%;}
  }
  #frame{
    position:absolute;
    left:8%;
    right:8%;
    top:20%;
    bottom:20%;
    border:2px solid rgba(255,255,255,0.5);
    border-radius:8px;
    pointer-events:none;
  }
  #status{
    margin-top:14px;
    font-size:14px;
    color:var(--muted);
    min-height:20px;
    text-align:center;
  }
  #result{
    width:100%;
    max-width:420px;
    margin-top:16px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 18px;
    display:none;
  }
  #result.show{display:block;}
  #result .label{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  #result .value{
    font-size:22px;
    font-weight:600;
    margin:4px 0 14px;
    word-break:break-all;
  }
  button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  #open-btn{
    background:var(--accent);
    color:#fff;
  }
  #open-btn:active{background:var(--accent-dark);}
  #rescan-btn{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--border);
    margin-top:8px;
  }
  #error{
    max-width:420px;
    margin-top:16px;
    padding:14px 16px;
    background:#FAECE7;
    color:var(--danger);
    border-radius:10px;
    font-size:13px;
    display:none;
  }
  #error.show{display:block;}
  #manual-wrap{
    width:100%;
    max-width:420px;
    margin-top:22px;
    text-align:center;
  }
  #manual-wrap a{
    font-size:13px;
    color:var(--muted);
    text-decoration:underline;
  }
</style>
</head>
<body>

<h1>Escanear serial del dispositivo</h1>
<p class="sub">Apunta la cámara al código de barras</p>

<div id="video-wrap">
  <video id="video" playsinline autoplay muted></video>
  <div id="frame"></div>
  <div id="scan-line"></div>
</div>

<div id="status">Iniciando cámara...</div>

<div id="result">
  <div class="label">Serial leído</div>
  <div class="value" id="result-value"></div>
  <button id="open-btn">Abrir formulario</button>
  <button id="rescan-btn">Escanear otro</button>
</div>

<div id="error"></div>

<div id="manual-wrap">
  <a id="manual-link" href="#" target="_blank" rel="noopener">Ir al formulario en blanco (sin escanear)</a>
</div>

<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script>
  // ---- CONFIGURACIÓN ----
  // Link "precompletar" de tu Google Form, con el valor de prueba a reemplazar.
  var PREFILL_URL = "https://docs.google.com/forms/d/e/1FAIpQLScZuC4yuBtt9-hs9fi988sz-g5IVam9-gKQgvcEaawYA9Xh9Q/viewform?usp=pp_url&entry.580163643=TEST123";
  var TEST_VALUE = "TEST123";
  // -----------------------

  document.getElementById('manual-link').href = PREFILL_URL.replace(TEST_VALUE, '');

  var statusEl = document.getElementById('status');
  var resultEl = document.getElementById('result');
  var resultValueEl = document.getElementById('result-value');
  var errorEl = document.getElementById('error');
  var videoWrap = document.getElementById('video-wrap');
  var openBtn = document.getElementById('open-btn');
  var rescanBtn = document.getElementById('rescan-btn');

  var codeReader = new ZXing.BrowserMultiFormatReader();
  var lastFinalUrl = "";
  var scanning = false;

  function showError(msg){
    errorEl.textContent = msg;
    errorEl.classList.add('show');
    statusEl.textContent = "";
  }

  function buildFinalUrl(scannedValue){
    return PREFILL_URL.replace(TEST_VALUE, encodeURIComponent(scannedValue));
  }

  function onScanSuccess(text){
    if (!scanning) return;
    scanning = false;
    codeReader.reset();
    videoWrap.style.display = 'none';
    statusEl.textContent = "";
    resultValueEl.textContent = text;
    lastFinalUrl = buildFinalUrl(text);
    resultEl.classList.add('show');
    if (navigator.vibrate) navigator.vibrate(80);
  }

  function startScanning(){
    scanning = true;
    resultEl.classList.remove('show');
    errorEl.classList.remove('show');
    videoWrap.style.display = 'block';
    statusEl.textContent = "Iniciando cámara...";

    codeReader.listVideoInputDevices().then(function(devices){
      if (!devices || devices.length === 0){
        showError("No se encontró ninguna cámara en este dispositivo.");
        return;
      }
      var deviceId = devices[0].deviceId;
      for (var i=0; i<devices.length; i++){
        if (/back|rear|environment/i.test(devices[i].label)){
          deviceId = devices[i].deviceId;
          break;
        }
      }
      statusEl.textContent = "Buscando código de barras...";
      codeReader.decodeFromVideoDevice(deviceId, 'video', function(result, err){
        if (result){
          onScanSuccess(result.getText());
        }
      });
    }).catch(function(err){
      showError("No se pudo acceder a la cámara. Revisa que hayas dado permiso de cámara al navegador, y que la página se abra por HTTPS. Detalle: " + err.message);
    });
  }

  openBtn.addEventListener('click', function(){
    window.open(lastFinalUrl, '_blank');
  });

  rescanBtn.addEventListener('click', startScanning);

  startScanning();
</script>

</body>
</html>
